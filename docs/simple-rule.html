<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple rule</title>
  <style>
    :root {
      --page-bg: #ffffff;
      --text-primary: #111827;
      --text-secondary: #374151;
      --code-bg: #f1f3f5;
      --code-text: #374151;
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --radius-sm: 4px;
      --content-width: 42rem;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page-bg);
      color: var(--text-primary);
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
    }

    main {
      padding: clamp(2.5rem, 8vw, 5rem) clamp(1.25rem, 5vw, 3rem);
    }

    .doc-section {
      max-width: var(--content-width);
    }

    h1 {
      margin: 0 0 var(--space-4);
      font-size: clamp(1.375rem, 2.5vw, 1.625rem);
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -0.01em;
    }

    ul {
      margin: 0 0 var(--space-6);
      padding-left: 1.35rem;
    }

    li {
      color: var(--text-secondary);
      margin-bottom: var(--space-3);
    }

    li:last-child {
      margin-bottom: 0;
    }

    p {
      margin: 0;
      color: var(--text-secondary);
    }

    code {
      display: inline-block;
      padding: 0.12rem 0.42rem;
      border-radius: var(--radius-sm);
      background: var(--code-bg);
      color: var(--code-text);
      font-family: Consolas, "SFMono-Regular", "Liberation Mono", Menlo, monospace;
      font-size: 0.95em;
    }

    @media (max-width: 480px) {
      ul {
        padding-left: 1.15rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="doc-section" aria-labelledby="simple-rule-title">
      <h1 id="simple-rule-title">Simple rule</h1>
      <ul>
        <li>Main database &rarr; <code>words_clean.csv</code></li>
        <li>Review later &rarr; <code>words_review_flagged.csv</code></li>
        <li>Just report &rarr; <code>cleaning_summary.txt</code></li>
      </ul>
      <p>Next step is to import <code>words_clean.csv</code> into SQLite.</p>
    </section>
  </main>
</body>
</html>
